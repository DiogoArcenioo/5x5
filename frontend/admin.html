<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin • 5x5.gg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0c10;--panel:#12151c;--panel2:#171a22;--line:#242833;--text:#f4f5f7;--muted:#8b94a4;--dim:#5d6676;--orange:#ff5c1a;--cyan:#2fb8c6;--green:#34c77b;--red:#ef5350;--yellow:#f2b53d}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Manrope,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}.mono{font-family:'JetBrains Mono',monospace}
    .shell{min-height:100vh;display:grid;grid-template-columns:250px 1fr}.side{position:sticky;top:0;height:100vh;padding:20px 14px;background:#0e1117;border-right:1px solid var(--line);overflow:auto}.brand{display:flex;align-items:center;gap:10px;padding:0 8px 22px;font-family:'Chakra Petch';font-weight:700;font-size:19px}.mark{background:var(--orange);color:#080a0d;padding:7px 8px;clip-path:polygon(12% 0,100% 0,88% 100%,0 100%)}.nav-title{margin:18px 10px 7px;color:var(--dim);font-size:10px;font-weight:800;letter-spacing:.1em}.nav{width:100%;border:0;background:transparent;color:#9ea6b4;text-align:left;padding:10px 12px;border-radius:8px;margin:2px 0;font-weight:700;font-size:13px}.nav:hover,.nav.active{background:#1a1e27;color:#fff}.nav.active{box-shadow:inset 3px 0 var(--orange)}
    .content{min-width:0}.top{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;border-bottom:1px solid var(--line);background:rgba(10,12,16,.94);position:sticky;top:0;z-index:10}.status{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px}.dot{width:8px;height:8px;border-radius:50%;background:var(--yellow)}.dot.ok{background:var(--green)}.main{max-width:1400px;margin:auto;padding:28px}.heading{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:22px}.heading h1{font:700 28px 'Chakra Petch';margin:0 0 5px}.sub{color:var(--muted);font-size:13px}.grid{display:grid;grid-template-columns:minmax(310px,420px) 1fr;gap:20px}.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}.card h2{font:700 17px 'Chakra Petch';margin:0 0 15px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}.stat b{display:block;font:700 27px 'JetBrains Mono';color:var(--orange)}.stat span{font-size:12px;color:var(--muted)}
    .fields{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}.field label{font-size:11px;color:#a5adba;font-weight:800;text-transform:uppercase;letter-spacing:.045em}.field small{color:var(--dim)}input,select,textarea{width:100%;background:#0c0f14;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:10px 11px;outline:none}input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(47,184,198,.12)}textarea{min-height:90px;resize:vertical}.actions{display:flex;gap:8px;margin-top:16px}.btn{border:1px solid var(--line);border-radius:8px;padding:10px 14px;background:#1a1e27;color:#dce0e7;font-weight:800;font-size:12px}.btn.primary{background:var(--orange);border-color:var(--orange);color:#090b0e}.btn.danger{color:#ff8c89}.btn.small{padding:6px 9px;font-size:11px}.btn:disabled{opacity:.5;cursor:not-allowed}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:10px}table{width:100%;border-collapse:collapse;font-size:12.5px}th,td{padding:11px 12px;text-align:left;border-bottom:1px solid #1d212b;white-space:nowrap}th{color:#778192;background:#0e1117;font-size:10px;text-transform:uppercase;letter-spacing:.06em}tr:last-child td{border-bottom:0}.badge{display:inline-flex;padding:3px 7px;border-radius:5px;background:rgba(47,184,198,.12);color:var(--cyan);font-size:10px;font-weight:800}.empty{text-align:center;padding:35px;color:var(--dim)}.toolbar{display:flex;gap:9px;margin-bottom:12px}.toolbar input{max-width:320px}.notice{padding:11px 13px;border:1px solid rgba(242,181,61,.3);background:rgba(242,181,61,.08);color:#e3c477;border-radius:8px;font-size:12px;margin-bottom:15px}.toast{position:fixed;right:20px;bottom:20px;z-index:100;background:#171b23;border:1px solid var(--line);border-left:4px solid var(--green);border-radius:9px;padding:13px 16px;box-shadow:0 16px 40px #0008;max-width:390px;font-size:13px}.toast.error{border-left-color:var(--red)}.hidden{display:none!important}.loading{opacity:.55;pointer-events:none}.tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}.tab{border:1px solid var(--line);background:var(--panel);color:var(--muted);padding:8px 12px;border-radius:8px;font-size:12px;font-weight:800}.tab.active{background:var(--cyan);border-color:var(--cyan);color:#071013}.help{font-size:11px;color:var(--dim);line-height:1.5;margin-top:12px}.mobile-menu{display:none}
    @media(max-width:900px){.shell{grid-template-columns:1fr}.side{display:none;position:fixed;z-index:30;width:260px}.side.open{display:block}.mobile-menu{display:block}.grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.main{padding:20px}.top{padding:0 18px}}@media(max-width:540px){.fields,.stats{grid-template-columns:1fr}.field.full{grid-column:auto}.heading{flex-direction:column}}
  </style>
</head>
<body>
<div class="shell">
  <aside class="side" id="sidebar">
    <div class="brand"><span class="mark">5x5</span><span>5x5<span style="color:var(--orange)">.gg</span> Admin</span></div>
    <div class="nav-title">PRINCIPAL</div>
    <button class="nav active" data-page="dashboard">Visão geral</button>
    <button class="nav" data-page="teams">Times</button>
    <button class="nav" data-page="players">Jogadores</button>
    <div class="nav-title">ESTRUTURA COMPETITIVA</div>
    <button class="nav" data-page="base">Regiões e países</button>
    <button class="nav" data-page="seasons">Temporadas</button>
    <button class="nav" data-page="links">Vínculos e versões</button>
    <div class="nav-title">TODOS OS DADOS</div>
    <button class="nav" data-page="advanced">Cadastro avançado</button>
    <a class="nav" href="/5x5.dc.html" style="display:block;text-decoration:none;margin-top:20px">← Voltar ao jogo</a>
  </aside>
  <section class="content">
    <header class="top">
      <button class="btn mobile-menu" id="menuButton">☰</button>
      <div class="status"><span class="dot" id="apiDot"></span><span id="apiStatus">Verificando API…</span></div>
      <a href="/docs" target="_blank" class="btn" style="text-decoration:none">Swagger ↗</a>
    </header>
    <main class="main" id="app"></main>
  </section>
</div>
<div id="toast" class="toast hidden"></div>

<script>
const API='/api';
const state={page:'dashboard',teams:[],players:[],countries:[],regions:[],seasons:[],memberships:[],resources:[],editingTeam:null,editingPlayer:null,advancedResource:null};
const $=(s,root=document)=>root.querySelector(s); const $$=(s,root=document)=>[...root.querySelectorAll(s)];
function esc(value){return String(value??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function dateValue(value){return value?String(value).slice(0,10):''}
function cleanObject(object,{nullEmpty=false}={}){const result={};for(const [key,value] of Object.entries(object)){if(value===''||value===undefined){if(nullEmpty)result[key]=null;continue}result[key]=value}return result}
function formObject(form){return Object.fromEntries(new FormData(form).entries())}
function toast(message,error=false){const el=$('#toast');el.textContent=message;el.className='toast'+(error?' error':'');clearTimeout(toast.timer);toast.timer=setTimeout(()=>el.classList.add('hidden'),4200)}
async function api(path,options={}){const response=await fetch(API+path,{headers:{'Content-Type':'application/json',...(options.headers||{})},...options});let body=null;try{body=await response.json()}catch{}if(!response.ok){const raw=body?.message?.message||body?.message||`Erro HTTP ${response.status}`;throw new Error(Array.isArray(raw)?raw.join(' · '):typeof raw==='string'?raw:JSON.stringify(raw))}return body}
async function list(resource,pageSize=100){return (await api(`/admin/data/${resource}?page=1&pageSize=${pageSize}`)).data}
async function loadBase(){const [teams,players,countries,regions,seasons,memberships,resources]=await Promise.all([list('teams'),api('/admin/players?page=1&pageSize=100').then(x=>x.data),list('countries'),list('regions'),list('seasons'),list('player-memberships'),api('/admin/data/resources')]);Object.assign(state,{teams,players,countries,regions,seasons,memberships,resources});}
function option(items,value,label,selected=''){return items.map(item=>`<option value="${esc(item[value])}" ${String(item[value])===String(selected)?'selected':''}>${esc(item[label])}</option>`).join('')}
function countrySelect(name,value='',required=false){return `<select name="${name}" ${required?'required':''}><option value="">Selecione…</option>${option(state.countries,'code','name',value)}</select>`}
function playerSelect(name,value=''){return `<select name="${name}" required><option value="">Selecione…</option>${state.players.map(p=>`<option value="${p.id}" ${p.id===value?'selected':''}>${esc(p.nickname)} — ${esc(p.displayName)}</option>`).join('')}</select>`}
function teamSelect(name,value=''){return `<select name="${name}" required><option value="">Selecione…</option>${option(state.teams,'id','name',value)}</select>`}
function seasonSelect(name,value=''){return `<select name="${name}" required><option value="">Selecione…</option>${option(state.seasons,'id','name',value)}</select>`}
function pageTitle(title,sub,action=''){return `<div class="heading"><div><h1>${title}</h1><div class="sub">${sub}</div></div>${action}</div>`}
function empty(text){return `<div class="empty">${text}</div>`}
function render(){const views={dashboard:renderDashboard,teams:renderTeams,players:renderPlayers,base:renderBase,seasons:renderSeasons,links:renderLinks,advanced:renderAdvanced};$('#app').innerHTML=views[state.page]();bindPage();$$('.nav[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===state.page));}
function renderDashboard(){return pageTitle('Visão geral','Cadastre primeiro a estrutura básica e depois os jogadores.')+`<div class="stats"><div class="stat"><b>${state.teams.length}</b><span>times</span></div><div class="stat"><b>${state.players.length}</b><span>jogadores</span></div><div class="stat"><b>${state.seasons.length}</b><span>temporadas</span></div><div class="stat"><b>${state.countries.length}</b><span>países</span></div></div><div class="card" style="margin-top:20px"><h2>Ordem recomendada</h2><div class="notice">Para cadastrar uma versão completa: região/país → temporada → time → jogador → passagem pelo time → versão competitiva → funções e ratings.</div><div class="actions"><button class="btn primary" data-go="teams">Cadastrar time</button><button class="btn" data-go="players">Cadastrar jogador</button><button class="btn" data-go="links">Criar vínculo e versão</button></div></div>`}
function renderTeams(){const t=state.editingTeam||{};return pageTitle('Times','Cadastre organizações sem imagens nesta fase.')+`<div class="grid"><form class="card" id="teamForm"><h2>${t.id?'Editar time':'Novo time'}</h2><div class="fields"><div class="field full"><label>Nome *</label><input name="name" required maxlength="120" value="${esc(t.name)}"></div><div class="field"><label>Sigla</label><input name="shortName" maxlength="20" value="${esc(t.shortName)}"></div><div class="field"><label>Slug *</label><input name="slug" required maxlength="140" pattern="[a-z0-9]+(?:-[a-z0-9]+)*" value="${esc(t.slug)}" placeholder="furia"></div><div class="field full"><label>País</label>${countrySelect('countryCode',t.countryCode)}</div><div class="field"><label>Fundação</label><input type="date" name="foundedOn" value="${dateValue(t.foundedOn)}"></div><div class="field"><label>Encerramento</label><input type="date" name="disbandedOn" value="${dateValue(t.disbandedOn)}"></div></div><div class="actions"><button class="btn primary" type="submit">${t.id?'Salvar alterações':'Cadastrar time'}</button>${t.id?'<button class="btn" type="button" id="cancelTeam">Cancelar</button>':''}</div></form><section class="card"><h2>Times cadastrados</h2><div class="toolbar"><input id="teamSearch" placeholder="Buscar time…"></div><div class="table-wrap"><table><thead><tr><th>Time</th><th>País</th><th>Fundação</th><th>Ações</th></tr></thead><tbody id="teamRows">${teamRows(state.teams)}</tbody></table></div></section></div>`}
function teamRows(items){return items.length?items.map(t=>`<tr><td><b>${esc(t.name)}</b><br><span class="sub">${esc(t.shortName||t.slug)}</span></td><td>${esc(t.countryCode||'—')}</td><td>${dateValue(t.foundedOn)||'—'}</td><td><button class="btn small" data-edit-team="${t.id}">Editar</button> <button class="btn small danger" data-delete-team="${t.id}">Excluir</button></td></tr>`).join(''):`<tr><td colspan="4">${empty('Nenhum time cadastrado.')}</td></tr>`}
function renderPlayers(){const p=state.editingPlayer||{};const aliases=(p.aliases||[]).map(x=>x.alias).join(', ');return pageTitle('Jogadores','A pessoa e sua carreira de jogador são salvas na mesma transação.')+`<div class="grid"><form class="card" id="playerForm"><h2>${p.id?'Editar jogador':'Novo jogador'}</h2><div class="fields"><div class="field full"><label>Nome de exibição *</label><input name="displayName" required maxlength="120" value="${esc(p.displayName)}"></div><div class="field full"><label>Nome legal</label><input name="legalName" maxlength="160" value="${esc(p.legalName)}"></div><div class="field"><label>Nickname *</label><input name="nickname" required maxlength="60" value="${esc(p.nickname)}"></div><div class="field"><label>Slug *</label><input name="slug" required maxlength="80" pattern="[a-z0-9]+(?:-[a-z0-9]+)*" value="${esc(p.slug)}"></div><div class="field"><label>Nascimento</label><input type="date" name="birthDate" value="${dateValue(p.birthDate)}"></div><div class="field"><label>Nacionalidade</label>${countrySelect('nationalityCode',p.nationalityCode)}</div><div class="field"><label>Estreia</label><input type="date" name="debutDate" value="${dateValue(p.debutDate)}"></div><div class="field"><label>Aposentadoria</label><input type="date" name="retirementDate" value="${dateValue(p.retirementDate)}"></div><div class="field"><label>Status *</label><select name="careerStatus" required>${[['active','Ativo'],['inactive','Inativo'],['retired','Aposentado']].map(([v,l])=>`<option value="${v}" ${p.careerStatus===v?'selected':''}>${l}</option>`).join('')}</select></div><div class="field full"><label>Aliases</label><input name="aliases" value="${esc(aliases)}" placeholder="FalleN, fallen"><small>Separe nomes aceitos por vírgula.</small></div></div><div class="actions"><button class="btn primary" type="submit">${p.id?'Salvar alterações':'Cadastrar jogador'}</button>${p.id?'<button class="btn" type="button" id="cancelPlayer">Cancelar</button>':''}</div></form><section class="card"><h2>Jogadores cadastrados</h2><div class="toolbar"><input id="playerSearch" placeholder="Buscar jogador…"></div><div class="table-wrap"><table><thead><tr><th>Jogador</th><th>País</th><th>Status</th><th>Ações</th></tr></thead><tbody id="playerRows">${playerRows(state.players)}</tbody></table></div></section></div>`}
function playerRows(items){return items.length?items.map(p=>`<tr><td><b>${esc(p.nickname)}</b><br><span class="sub">${esc(p.displayName)}</span></td><td>${esc(p.nationalityCode||'—')}</td><td><span class="badge">${esc(p.careerStatus)}</span></td><td><button class="btn small" data-edit-player="${p.id}">Editar</button> <button class="btn small danger" data-delete-player="${p.id}">Excluir</button></td></tr>`).join(''):`<tr><td colspan="4">${empty('Nenhum jogador cadastrado.')}</td></tr>`}
function renderBase(){return pageTitle('Regiões e países','Cadastre a localização antes de vinculá-la a jogadores e times.')+`<div class="grid"><div><form class="card" id="regionForm"><h2>Nova região</h2><div class="fields"><div class="field"><label>Código *</label><input name="code" maxlength="20" required placeholder="SA"></div><div class="field"><label>Nome *</label><input name="name" maxlength="80" required placeholder="América do Sul"></div></div><button class="btn primary" style="margin-top:15px">Cadastrar região</button></form><form class="card" id="countryForm" style="margin-top:18px"><h2>Novo país</h2><div class="fields"><div class="field"><label>ISO *</label><input name="code" minlength="2" maxlength="2" required placeholder="BR"></div><div class="field"><label>Nome *</label><input name="name" maxlength="100" required placeholder="Brasil"></div><div class="field full"><label>Região</label><select name="regionId"><option value="">Selecione…</option>${option(state.regions,'id','name')}</select></div></div><button class="btn primary" style="margin-top:15px">Cadastrar país</button></form></div><div class="card"><h2>Estrutura cadastrada</h2><div class="table-wrap"><table><thead><tr><th>País</th><th>ISO</th><th>Região</th></tr></thead><tbody>${state.countries.length?state.countries.map(c=>`<tr><td>${esc(c.name)}</td><td>${esc(c.code)}</td><td>${esc(state.regions.find(r=>String(r.id)===String(c.regionId))?.name||'—')}</td></tr>`).join(''):`<tr><td colspan="3">${empty('Nenhum país cadastrado.')}</td></tr>`}</tbody></table></div><h2 style="margin-top:20px">Regiões</h2>${state.regions.map(r=>`<span class="badge" style="margin:3px">${esc(r.code)} · ${esc(r.name)}</span>`).join('')||empty('Nenhuma região.')}</div></div>`}
function renderSeasons(){return pageTitle('Temporadas','Use anos completos ou períodos competitivos com datas explícitas.')+`<div class="grid"><form class="card" id="seasonForm"><h2>Nova temporada</h2><div class="fields"><div class="field"><label>Código *</label><input name="code" required maxlength="30" placeholder="2026"></div><div class="field"><label>Nome *</label><input name="name" required maxlength="100" placeholder="Temporada 2026"></div><div class="field"><label>Ano *</label><input type="number" name="year" required min="1999" max="2200" value="2026"></div><div class="field"><label>Jogo *</label><select name="gameVersion"><option>CS2</option><option>CSGO</option><option>MIXED</option><option>CS</option></select></div><div class="field"><label>Início *</label><input type="date" name="startsOn" required></div><div class="field"><label>Fim *</label><input type="date" name="endsOn" required></div><div class="field full"><label><input style="width:auto" type="checkbox" name="isDraftEnabled"> Disponível no draft</label></div></div><button class="btn primary" style="margin-top:15px">Cadastrar temporada</button></form><div class="card"><h2>Temporadas</h2><div class="table-wrap"><table><thead><tr><th>Temporada</th><th>Período</th><th>Jogo</th></tr></thead><tbody>${state.seasons.length?state.seasons.map(s=>`<tr><td><b>${esc(s.name)}</b><br><span class="sub">${esc(s.code)}</span></td><td>${dateValue(s.startsOn)} → ${dateValue(s.endsOn)}</td><td>${esc(s.gameVersion)}</td></tr>`).join(''):`<tr><td colspan="3">${empty('Nenhuma temporada cadastrada.')}</td></tr>`}</tbody></table></div></div></div>`}
function renderLinks(){return pageTitle('Vínculos e versões','Primeiro registre a passagem; depois crie a versão do jogador naquela temporada.')+`<div class="tabs"><button class="tab active">Passagem + versão</button><button class="tab" data-go="advanced">Funções e ratings no cadastro avançado</button></div><div class="grid"><form class="card" id="membershipForm"><h2>1. Nova passagem por time</h2><div class="fields"><div class="field full"><label>Jogador *</label>${playerSelect('playerId')}</div><div class="field full"><label>Time *</label>${teamSelect('teamId')}</div><div class="field"><label>Início *</label><input type="date" name="startsOn" required></div><div class="field"><label>Fim</label><input type="date" name="endsOn"></div><div class="field full"><label>Status *</label><select name="rosterStatus"><option value="starter">Titular</option><option value="substitute">Reserva</option><option value="benched">Banco</option><option value="loan">Empréstimo</option></select></div><div class="field full"><label>Observações</label><textarea name="notes"></textarea></div></div><button class="btn primary" style="margin-top:15px">Cadastrar passagem</button></form><form class="card" id="versionForm"><h2>2. Nova versão competitiva</h2><div class="fields"><div class="field full"><label>Passagem *</label><select name="membershipId" required><option value="">Selecione…</option>${state.memberships.map(m=>{const p=state.players.find(x=>x.id===m.playerId),t=state.teams.find(x=>x.id===m.teamId);return `<option value="${m.id}" data-player="${m.playerId}" data-team="${m.teamId}">${esc(p?.nickname||m.playerId)} — ${esc(t?.name||m.teamId)} (${dateValue(m.startsOn)})</option>`}).join('')}</select></div><input type="hidden" name="playerId"><input type="hidden" name="teamId"><div class="field full"><label>Temporada *</label>${seasonSelect('seasonId')}</div><div class="field full"><label>Nome da versão *</label><input name="versionLabel" required maxlength="160" placeholder="FalleN — Luminosity — 2016"></div><div class="field"><label>Data de referência *</label><input type="date" name="referenceDate" required></div><div class="field"><label>Qualidade *</label><select name="dataQuality"><option value="estimated">Estimada</option><option value="partial">Parcial</option><option value="verified">Verificada</option></select></div><div class="field full"><label><input style="width:auto" type="checkbox" name="isDraftEligible" checked> Elegível para o draft</label></div></div><button class="btn primary" style="margin-top:15px">Criar versão</button></form></div>`}
function renderAdvanced(){const selected=state.advancedResource||state.resources[0]?.code;const meta=state.resources.find(r=>r.code===selected);if(!meta)return pageTitle('Cadastro avançado','Carregando metadados…');const fields=meta.fields.filter(f=>!f.generated&&f.name!=='createdAt'&&f.name!=='updatedAt');return pageTitle('Cadastro avançado','Acesso a todos os recursos do banco. Use os UUIDs exibidos nas listagens relacionadas.')+`<div class="notice">Para times e jogadores, prefira as telas dedicadas. Esta área atende funções, ratings, mapas, lineups, campeonatos, fontes, métricas e dicas.</div><div class="grid"><form class="card" id="advancedForm"><h2>Novo registro</h2><div class="field full" style="margin-bottom:15px"><label>Recurso</label><select id="resourceSelect">${state.resources.map(r=>`<option value="${r.code}" ${r.code===selected?'selected':''}>${esc(r.label)} — ${esc(r.code)}</option>`).join('')}</select></div><div class="fields">${fields.map(field=>dynamicField(field)).join('')}</div><button class="btn primary" style="margin-top:16px">Cadastrar em ${esc(meta.label)}</button><div class="help">Chave: ${meta.primaryKeys.map(esc).join(' + ')}. Campos com valor padrão podem ficar vazios.</div></form><section class="card"><h2>${esc(meta.label)}</h2><div id="advancedRows" class="empty">Carregando registros…</div></section></div>`}
function dynamicField(field){const required=!field.nullable&&!field.generated&&!['boolean'].includes(field.type);const type=String(field.type);if(type==='boolean')return `<div class="field"><label><input style="width:auto" type="checkbox" name="${field.name}"> ${esc(field.name)}</label></div>`;if(type==='jsonb')return `<div class="field full"><label>${esc(field.name)}</label><textarea name="${field.name}" placeholder="{}"></textarea></div>`;const inputType=['smallint','integer','numeric','bigint'].includes(type)?'number':type==='date'?'date':type==='timestamptz'?'datetime-local':'text';return `<div class="field ${type==='text'?'full':''}"><label>${esc(field.name)}${required?' *':''}</label><input type="${inputType}" name="${field.name}" ${required?'required':''}></div>`}
async function loadAdvancedRows(){const selected=state.advancedResource||state.resources[0]?.code;if(!selected||state.page!=='advanced')return;try{const rows=await list(selected,50);const meta=state.resources.find(r=>r.code===selected);const el=$('#advancedRows');if(!rows.length){el.innerHTML=empty('Nenhum registro.');return}const columns=meta.fields.slice(0,6).map(f=>f.name);el.innerHTML=`<div class="table-wrap"><table><thead><tr>${columns.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${rows.map(row=>`<tr>${columns.map(c=>`<td title="${esc(typeof row[c]==='object'?JSON.stringify(row[c]):row[c])}">${esc(typeof row[c]==='object'?JSON.stringify(row[c]):row[c]??'—')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}catch(error){toast(error.message,true)}}
function bindPage(){$$('[data-go]').forEach(b=>b.onclick=()=>go(b.dataset.go));if(state.page==='teams')bindTeams();if(state.page==='players')bindPlayers();if(state.page==='base')bindBase();if(state.page==='seasons')bindSeasons();if(state.page==='links')bindLinks();if(state.page==='advanced')bindAdvanced()}
function go(page){state.page=page;state.editingTeam=null;state.editingPlayer=null;render();$('#sidebar').classList.remove('open')}
function setBusy(form,busy){form.classList.toggle('loading',busy);$$('button',form).forEach(b=>b.disabled=busy)}
function bindTeams(){const form=$('#teamForm');form.onsubmit=async e=>{e.preventDefault();setBusy(form,true);try{const raw=formObject(form);const data=cleanObject(raw,{nullEmpty:!!state.editingTeam});if(state.editingTeam)await api('/admin/data/teams',{method:'PATCH',body:JSON.stringify({key:{id:state.editingTeam.id},data})});else await api('/admin/data/teams',{method:'POST',body:JSON.stringify({data})});toast('Time salvo com sucesso.');state.teams=await list('teams');state.editingTeam=null;render()}catch(error){toast(error.message,true)}finally{setBusy(form,false)}};$('#cancelTeam')?.addEventListener('click',()=>{state.editingTeam=null;render()});$$('[data-edit-team]').forEach(b=>b.onclick=()=>{state.editingTeam=state.teams.find(t=>t.id===b.dataset.editTeam);render()});$$('[data-delete-team]').forEach(b=>b.onclick=async()=>{if(!confirm('Excluir este time?'))return;try{await api('/admin/data/teams',{method:'DELETE',body:JSON.stringify({key:{id:b.dataset.deleteTeam}})});state.teams=await list('teams');toast('Time excluído.');render()}catch(error){toast(error.message,true)}});$('#teamSearch').oninput=e=>{$('#teamRows').innerHTML=teamRows(state.teams.filter(t=>`${t.name} ${t.shortName||''}`.toLowerCase().includes(e.target.value.toLowerCase())))}}
function bindPlayers(){const form=$('#playerForm');form.onsubmit=async e=>{e.preventDefault();setBusy(form,true);try{const raw=formObject(form);const aliasList=String(raw.aliases||'').split(',').map(x=>x.trim()).filter(Boolean);delete raw.aliases;const data=cleanObject(raw,{nullEmpty:!!state.editingPlayer});data.aliases=aliasList.map(alias=>({alias,aliasType:alias.toLowerCase()===String(data.nickname||state.editingPlayer?.nickname).toLowerCase()?'nickname':'former_nick'}));if(state.editingPlayer)await api(`/admin/players/${state.editingPlayer.id}`,{method:'PATCH',body:JSON.stringify(data)});else await api('/admin/players',{method:'POST',body:JSON.stringify(data)});toast('Jogador salvo com sucesso.');state.players=(await api('/admin/players?page=1&pageSize=100')).data;state.editingPlayer=null;render()}catch(error){toast(error.message,true)}finally{setBusy(form,false)}};$('#cancelPlayer')?.addEventListener('click',()=>{state.editingPlayer=null;render()});$$('[data-edit-player]').forEach(b=>b.onclick=async()=>{try{state.editingPlayer=await api(`/admin/players/${b.dataset.editPlayer}`);render()}catch(error){toast(error.message,true)}});$$('[data-delete-player]').forEach(b=>b.onclick=async()=>{if(!confirm('Excluir este jogador? Se houver histórico, a API impedirá a exclusão.'))return;try{await api(`/admin/players/${b.dataset.deletePlayer}`,{method:'DELETE'});state.players=(await api('/admin/players?page=1&pageSize=100')).data;toast('Jogador excluído.');render()}catch(error){toast(error.message,true)}});$('#playerSearch').oninput=e=>{$('#playerRows').innerHTML=playerRows(state.players.filter(p=>`${p.nickname} ${p.displayName}`.toLowerCase().includes(e.target.value.toLowerCase())))}}
function bindBase(){$('#regionForm').onsubmit=async e=>{e.preventDefault();try{const data=formObject(e.target);await api('/admin/data/regions',{method:'POST',body:JSON.stringify({data})});state.regions=await list('regions');toast('Região cadastrada.');render()}catch(error){toast(error.message,true)}};$('#countryForm').onsubmit=async e=>{e.preventDefault();try{const data=cleanObject(formObject(e.target));data.code=data.code.toUpperCase();if(data.regionId)data.regionId=Number(data.regionId);await api('/admin/data/countries',{method:'POST',body:JSON.stringify({data})});state.countries=await list('countries');toast('País cadastrado.');render()}catch(error){toast(error.message,true)}}}
function bindSeasons(){$('#seasonForm').onsubmit=async e=>{e.preventDefault();try{const raw=formObject(e.target);const data={...raw,year:Number(raw.year),isDraftEnabled:$('[name=isDraftEnabled]',e.target).checked};await api('/admin/data/seasons',{method:'POST',body:JSON.stringify({data})});state.seasons=await list('seasons');toast('Temporada cadastrada.');render()}catch(error){toast(error.message,true)}}}
function bindLinks(){$('#membershipForm').onsubmit=async e=>{e.preventDefault();try{const data=cleanObject(formObject(e.target));await api('/admin/data/player-memberships',{method:'POST',body:JSON.stringify({data})});state.memberships=await list('player-memberships');toast('Passagem cadastrada. Agora crie a versão.');render()}catch(error){toast(error.message,true)}};const vf=$('#versionForm'),membership=$('[name=membershipId]',vf);membership.onchange=()=>{const o=membership.selectedOptions[0];$('[name=playerId]',vf).value=o?.dataset.player||'';$('[name=teamId]',vf).value=o?.dataset.team||''};vf.onsubmit=async e=>{e.preventDefault();try{membership.onchange();const data=cleanObject(formObject(vf));data.isDraftEligible=$('[name=isDraftEligible]',vf).checked;await api('/admin/data/player-versions',{method:'POST',body:JSON.stringify({data})});toast('Versão competitiva criada.');vf.reset()}catch(error){toast(error.message,true)}}}
function bindAdvanced(){const select=$('#resourceSelect');select.onchange=()=>{state.advancedResource=select.value;render()};$('#advancedForm').onsubmit=async e=>{e.preventDefault();try{const meta=state.resources.find(r=>r.code===(state.advancedResource||state.resources[0].code));const raw=formObject(e.target),data={};for(const field of meta.fields.filter(f=>!f.generated)){let value=raw[field.name];if(field.type==='boolean')value=$(`[name=${field.name}]`,e.target)?.checked??false;if(value===''||value===undefined)continue;if(['smallint','integer','numeric','bigint'].includes(field.type))value=Number(value);if(field.type==='jsonb')value=JSON.parse(value);data[field.name]=value}await api(`/admin/data/${meta.code}`,{method:'POST',body:JSON.stringify({data})});toast(`Registro criado em ${meta.label}.`);e.target.reset();loadAdvancedRows()}catch(error){toast(error.message,true)}};loadAdvancedRows()}
$$('.nav[data-page]').forEach(button=>button.onclick=()=>go(button.dataset.page));$('#menuButton').onclick=()=>$('#sidebar').classList.toggle('open');
(async function init(){try{await api('/health');$('#apiDot').classList.add('ok');$('#apiStatus').textContent='API e banco conectados';await loadBase();render()}catch(error){$('#apiStatus').textContent='Falha na conexão';toast(error.message,true);$('#app').innerHTML=pageTitle('API indisponível','Inicie o backend com npm run start:dev.')+`<div class="notice">${esc(error.message)}</div>`}})();
</script>
</body>
</html>
