<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="5x5.gg — jogo de navegador sobre o cenário competitivo de Counter-Strike">
  <title>5x5.gg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0c10;--panel:#12151c;--panel2:#171a22;--line:#242833;--text:#f4f5f7;--muted:#929baa;--dim:#626b7a;--orange:#ff5c1a;--cyan:#2fb8c6;--green:#34c77b;--red:#ef5350;--yellow:#f2b53d;--blue:#4f8dfd}
    *{box-sizing:border-box;-webkit-font-smoothing:antialiased}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:Manrope,sans-serif}button,input,select{font:inherit}a{color:inherit;text-decoration:none}button{cursor:pointer}.hidden{display:none!important}.mono{font-family:'JetBrains Mono',monospace}
    header{position:sticky;top:0;z-index:50;background:rgba(10,12,16,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.header-inner{height:64px;max-width:1380px;margin:auto;padding:0 24px;display:flex;align-items:center;gap:24px}.brand{display:flex;align-items:center;gap:9px;font:700 18px 'Chakra Petch'}.brand-mark{background:var(--orange);color:#080a0d;padding:7px 8px;clip-path:polygon(13% 0,100% 0,87% 100%,0 100%)}nav{display:flex;align-items:center;gap:3px;flex:1}.nav-link{border:0;background:none;color:#929baa;padding:9px 11px;border-radius:7px;font-size:12.5px;font-weight:700}.nav-link:hover,.nav-link.active{color:#fff;background:#171a22}.admin{background:var(--orange);color:#090b0e;padding:9px 13px;border-radius:8px;font-size:11px;font-weight:900}.menu{display:none;border:1px solid var(--line);background:var(--panel);color:white;border-radius:8px;padding:8px 11px}
    main{min-height:calc(100vh - 220px)}.container{width:min(1320px,calc(100% - 40px));margin:auto;padding:30px 0 80px}.hero{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:radial-gradient(circle at 80% 10%,rgba(255,92,26,.16),transparent 35%),linear-gradient(145deg,#12151c,#0c0f14);padding:62px 54px;margin-bottom:26px}.eyebrow{font-size:11px;color:var(--orange);font-weight:900;letter-spacing:.13em;text-transform:uppercase}.hero h1{font:700 clamp(38px,6vw,72px)/.98 'Chakra Petch';max-width:800px;margin:14px 0 18px}.hero p{max-width:660px;color:#a4acb9;line-height:1.7;font-size:15px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:23px}.btn{border:1px solid var(--line);background:#181c25;color:#e9ebef;padding:10px 14px;border-radius:8px;font-size:12px;font-weight:800}.btn:hover{border-color:#454c5a}.btn.primary{background:var(--orange);color:#080a0d;border-color:var(--orange)}.btn:disabled{opacity:.42;cursor:not-allowed}.btn.danger{color:#ff9996}
    .heading{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:20px}.heading h1,.heading h2{font-family:'Chakra Petch';margin:0}.heading h1{font-size:30px}.heading h2{font-size:22px}.sub{color:var(--muted);font-size:13px;margin-top:5px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}.stat b{display:block;font:700 27px 'JetBrains Mono';color:var(--orange)}.stat span{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}.grid.two{grid-template-columns:repeat(2,1fr)}.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:17px;transition:.16s}.card.clickable{cursor:pointer}.card.clickable:hover{transform:translateY(-2px);border-color:#3b414e;background:#151922}.avatar{width:48px;height:48px;border-radius:11px;display:flex;align-items:center;justify-content:center;font:700 14px 'Chakra Petch';border:1px solid currentColor}.card-head{display:flex;align-items:center;gap:12px}.card-title{font-weight:800;font-size:14px}.card-meta{font-size:11px;color:var(--muted);margin-top:3px}.card-row{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #1e222c;padding-top:12px;margin-top:13px;color:var(--muted);font-size:11px}.badge{display:inline-flex;padding:3px 8px;border-radius:5px;background:rgba(47,184,198,.12);color:var(--cyan);font-size:10px;font-weight:800;margin:2px}.badge.green{color:var(--green);background:rgba(52,199,123,.12)}.badge.orange{color:var(--orange);background:rgba(255,92,26,.12)}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}.toolbar input,.toolbar select{background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:10px 12px;outline:none}.toolbar input{min-width:280px;flex:1}.toolbar input:focus,.toolbar select:focus{border-color:var(--cyan)}.empty{border:1px dashed #303541;border-radius:12px;padding:46px 22px;text-align:center;color:var(--dim);grid-column:1/-1}.empty strong{display:block;color:#aeb5c0;margin-bottom:7px}.loading{display:grid;place-items:center;min-height:300px;color:var(--muted)}.spinner{width:28px;height:28px;border:3px solid #242833;border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}@keyframes spin{to{transform:rotate(360deg)}}
    .profile-head{display:flex;align-items:center;gap:20px;padding:24px;background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:18px}.profile-head .avatar{width:76px;height:76px;font-size:22px}.profile-head h1{font:700 29px 'Chakra Petch';margin:0}.profile-meta{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-top:7px}.tabs{display:flex;gap:7px;flex-wrap:wrap;margin:20px 0 14px}.tab{border:1px solid var(--line);background:var(--panel);color:var(--muted);padding:8px 12px;border-radius:7px;font-size:11px;font-weight:800}.tab.active{background:var(--cyan);border-color:var(--cyan);color:#081013}.section{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:19px;margin-bottom:15px}.section h2{font:700 17px 'Chakra Petch';margin:0 0 15px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:9px}table{width:100%;border-collapse:collapse;font-size:12px}th,td{text-align:left;padding:11px 12px;border-bottom:1px solid #1e222c;white-space:nowrap}th{font-size:9.5px;color:#77808f;text-transform:uppercase;letter-spacing:.06em;background:#0e1117}tr:last-child td{border-bottom:0}.ratings{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.rating{background:#0e1117;border:1px solid #202530;border-radius:8px;padding:11px}.rating-top{display:flex;justify-content:space-between;font-size:11px;margin-bottom:7px}.bar{height:5px;background:#252b36;border-radius:9px;overflow:hidden}.bar span{display:block;height:100%;background:var(--cyan)}.quality{font-size:10px;color:var(--yellow)}
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.mode{background:linear-gradient(145deg,#141821,#0e1117);border:1px solid var(--line);border-radius:14px;padding:24px}.mode h2{font:700 22px 'Chakra Petch';margin:8px 0}.requirements{margin:18px 0;display:grid;gap:7px}.requirement{display:flex;justify-content:space-between;padding:9px 10px;background:#0b0e13;border-radius:7px;font-size:11px;color:var(--muted)}.requirement.ok span:last-child{color:var(--green)}.requirement.no span:last-child{color:var(--red)}.notice{padding:12px 14px;border-radius:8px;border:1px solid rgba(242,181,61,.28);background:rgba(242,181,61,.07);color:#d9bd72;font-size:12px;line-height:1.6}
    footer{border-top:1px solid var(--line);padding:30px 24px;color:var(--dim);font-size:11px}.footer-inner{max-width:1320px;margin:auto;display:flex;justify-content:space-between;gap:20px}.error-box{padding:14px;border:1px solid rgba(239,83,80,.35);background:rgba(239,83,80,.08);color:#ff9996;border-radius:8px}.toast{position:fixed;right:20px;bottom:20px;z-index:100;background:#171b23;border:1px solid var(--line);border-left:4px solid var(--red);padding:12px 15px;border-radius:8px;box-shadow:0 15px 40px #0008;font-size:12px}
    @media(max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(2,1fr)}nav{display:none}.menu{display:block;margin-left:auto}.header-inner.mobile-open nav{display:flex;position:absolute;top:64px;left:0;right:0;background:#0e1117;border-bottom:1px solid var(--line);padding:12px;flex-direction:column;align-items:stretch}.header-inner.mobile-open .nav-link{text-align:left}.mode-grid,.grid.two{grid-template-columns:1fr}}@media(max-width:580px){.container{width:min(100% - 24px,1320px);padding-top:20px}.hero{padding:38px 22px}.grid,.stats,.ratings{grid-template-columns:1fr}.profile-head{align-items:flex-start}.admin{display:none}.footer-inner{flex-direction:column}}
  </style>
</head>
<body>
  <header>
    <div class="header-inner" id="headerInner">
      <a class="brand" href="#/"><span class="brand-mark">5x5</span><span>5x5<span style="color:var(--orange)">.gg</span></span></a>
      <nav id="nav">
        <a class="nav-link" href="#/">Início</a><a class="nav-link" href="#/jogar">Jogar</a><a class="nav-link" href="#/jogadores">Jogadores</a><a class="nav-link" href="#/times">Times</a><a class="nav-link" href="#/temporadas">Temporadas</a><a class="nav-link" href="#/campeonatos">Campeonatos</a>
      </nav>
      <a class="admin" href="/admin.html">PAINEL ADMIN</a><button class="menu" id="menu">☰</button>
    </div>
  </header>
  <main id="app"><div class="loading"><div><div class="spinner"></div>Carregando banco de dados…</div></div></main>
  <footer><div class="footer-inner"><span>5x5.gg — projeto independente sobre Counter-Strike competitivo.</span><span>Todos os registros exibidos vêm do banco de dados do projeto.</span></div></footer>
  <div id="toast" class="toast hidden"></div>
<script>
const API='/api/catalog';
const cache={summary:null,players:null,teams:null,seasons:null,tournaments:null};
const app=document.querySelector('#app');
const esc=value=>String(value??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const date=value=>value?new Intl.DateTimeFormat('pt-BR',{timeZone:'UTC'}).format(new Date(String(value).slice(0,10)+'T00:00:00Z')):'—';
const year=value=>value?String(value).slice(0,4):'—';
const initials=value=>String(value||'?').trim().split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase();
function hue(key){let hash=0;for(const char of String(key))hash=(hash*31+char.charCodeAt(0))%360;return `hsl(${hash} 72% 60%)`}
function avatar(value,key,size=''){const color=hue(key||value);return `<div class="avatar" style="color:${color};background:${color.replace('60%', '60% / .1')}">${esc(initials(value))}</div>`}
function toast(message){const el=document.querySelector('#toast');el.textContent=message;el.classList.remove('hidden');clearTimeout(toast.timer);toast.timer=setTimeout(()=>el.classList.add('hidden'),4000)}
async function get(path){const response=await fetch(API+path);let body=null;try{body=await response.json()}catch{}if(!response.ok)throw new Error(body?.message||`Erro ${response.status}`);return body}
function loading(){app.innerHTML='<div class="loading"><div><div class="spinner"></div>Consultando banco de dados…</div></div>'}
function empty(title,text,admin=false){return `<div class="empty"><strong>${esc(title)}</strong>${esc(text)}${admin?'<div class="actions" style="justify-content:center"><a class="btn primary" href="/admin.html">Cadastrar agora</a></div>':''}</div>`}
function heading(title,sub,extra=''){return `<div class="heading"><div><h1>${esc(title)}</h1><div class="sub">${esc(sub)}</div></div>${extra}</div>`}
function stat(value,label){return `<div class="stat"><b>${Number(value||0)}</b><span>${esc(label)}</span></div>`}
function statusLabel(status){return ({active:'Ativo',inactive:'Inativo',retired:'Aposentado'})[status]||status||'Não informado'}
function playerCard(player){const roles=Array.isArray(player.roles)?player.roles:[];return `<article class="card clickable" data-href="#/jogadores/${encodeURIComponent(player.slug)}"><div class="card-head">${avatar(player.nickname,player.slug)}<div><div class="card-title">${esc(player.nickname)}</div><div class="card-meta">${esc(player.nationalityCode||'Sem país')} · ${esc(player.teamName||'Sem versão competitiva')}</div></div></div><div style="margin-top:11px">${roles.length?roles.map(r=>`<span class="badge">${esc(r.name||r.code)}</span>`).join(''):'<span class="badge">Sem função</span>'}</div><div class="card-row"><span>${esc(player.seasonName||'Sem temporada')}</span><span class="mono">OVR ${player.gameOverall??'—'}</span></div></article>`}
function teamCard(team){return `<article class="card clickable" data-href="#/times/${encodeURIComponent(team.slug)}"><div class="card-head">${avatar(team.shortName||team.name,team.slug)}<div><div class="card-title">${esc(team.name)}</div><div class="card-meta">${esc(team.countryName||team.countryCode||'Sem país')} · ${esc(team.regionName||'Sem região')}</div></div></div><div class="card-row"><span>${team.active?'<span class="badge green">Ativo</span>':'<span class="badge">Inativo</span>'}</span><span>${Number(team.playerCount||0)} jogador(es)</span></div></article>`}
async function ensureHome(){const [summary,players,teams]=await Promise.all([cache.summary||get('/summary'),cache.players||get('/players?page=1&pageSize=8'),cache.teams||get('/teams?page=1&pageSize=8')]);cache.summary=summary;cache.players=players;cache.teams=teams;return {summary,players,teams}}
async function home(){const {summary,players,teams}=await ensureHome();app.innerHTML=`<div class="container"><section class="hero"><div class="eyebrow">Counter-Strike competitivo</div><h1>CONSTRUA. COMPITA. DESCUBRA.</h1><p>Monte lineups históricas, simule campanhas e teste seu conhecimento. O catálogo abaixo é formado exclusivamente pelos registros cadastrados no banco do projeto.</p><div class="actions"><a class="btn primary" href="#/jogar">Ver minigames</a><a class="btn" href="#/jogadores">Explorar jogadores</a></div></section><div class="stats">${stat(summary.players,'jogadores')}${stat(summary.teams,'times')}${stat(summary.seasons,'temporadas')}${stat(summary.tournaments,'campeonatos')}</div><section style="margin-bottom:30px"><div class="heading"><div><h2>Jogadores cadastrados</h2><div class="sub">Versão competitiva mais recente disponível.</div></div><a class="btn" href="#/jogadores">Ver todos</a></div><div class="grid">${players.data.length?players.data.map(playerCard).join(''):empty('Nenhum jogador cadastrado','Use o painel administrativo para criar o primeiro jogador.',true)}</div></section><section><div class="heading"><div><h2>Times cadastrados</h2><div class="sub">Organizações presentes na base.</div></div><a class="btn" href="#/times">Ver todos</a></div><div class="grid">${teams.data.length?teams.data.map(teamCard).join(''):empty('Nenhum time cadastrado','Crie a primeira organização no painel administrativo.',true)}</div></section></div>`;bindCards()}
async function playersPage(){const data=await get('/players?page=1&pageSize=100');cache.players=data;app.innerHTML=`<div class="container">${heading('Jogadores','Identidades e versões competitivas registradas no banco.')}<div class="toolbar"><input id="search" placeholder="Buscar por nickname ou nome…"><select id="status"><option value="">Todos os status</option><option value="active">Ativos</option><option value="inactive">Inativos</option><option value="retired">Aposentados</option></select></div><div class="grid" id="playerGrid">${data.data.length?data.data.map(playerCard).join(''):empty('Nenhum jogador cadastrado','Cadastre jogadores no painel administrativo.',true)}</div></div>`;const filter=()=>{const q=document.querySelector('#search').value.toLowerCase(),status=document.querySelector('#status').value;const items=data.data.filter(p=>(!q||`${p.nickname} ${p.displayName}`.toLowerCase().includes(q))&&(!status||p.careerStatus===status));document.querySelector('#playerGrid').innerHTML=items.length?items.map(playerCard).join(''):empty('Nenhum resultado','Revise os filtros utilizados.');bindCards()};document.querySelector('#search').oninput=filter;document.querySelector('#status').onchange=filter;bindCards()}
async function playerPage(slug){const p=await get('/players/'+encodeURIComponent(slug));const latest=p.versions[0];app.innerHTML=`<div class="container"><a class="btn" href="#/jogadores">← Jogadores</a><div class="profile-head" style="margin-top:15px">${avatar(p.nickname,p.slug)}<div><h1>${esc(p.nickname)}</h1><div class="sub">${esc(p.displayName)}</div><div class="profile-meta"><span>${esc(p.countryName||p.nationalityCode||'Nacionalidade não informada')}</span><span>${esc(statusLabel(p.careerStatus))}</span><span>Estreia: ${year(p.debutDate)}</span></div></div></div><div class="stats">${stat(p.versions.length,'versões')}${stat(p.memberships.length,'passagens')}${stat(p.majors.filter(x=>x.isMajor).length,'Majors')}${stat(p.majors.filter(x=>x.isMajor&&Number(x.finalPlacement)===1).length,'títulos de Major')}</div><section class="section"><h2>Versões competitivas</h2>${p.versions.length?`<div class="table-wrap"><table><thead><tr><th>Versão</th><th>Temporada</th><th>Time</th><th>Funções</th><th>Overall</th><th>Qualidade</th></tr></thead><tbody>${p.versions.map(v=>`<tr><td>${esc(v.versionLabel)}</td><td>${esc(v.seasonName)}</td><td><a href="#/times/${encodeURIComponent(v.teamSlug)}" style="color:var(--cyan)">${esc(v.teamName)}</a></td><td>${(v.roles||[]).map(r=>esc(r.name)).join(', ')||'—'}</td><td class="mono">${v.gameOverall??'—'}</td><td><span class="quality">${esc(v.dataQuality)}</span></td></tr>`).join('')}</tbody></table></div>`:empty('Sem versões','Cadastre uma passagem e uma versão competitiva.',true)}</section>${latest&&latest.gameOverall!=null?ratingsSection(latest):''}<section class="section"><h2>Estatísticas observadas</h2>${p.performancePeriods.length?performanceTable(p.performancePeriods):empty('Sem estatísticas por período','Nenhuma métrica observada foi cadastrada.')}</section><section class="section"><h2>Histórico de times</h2>${p.memberships.length?`<div class="table-wrap"><table><thead><tr><th>Time</th><th>Início</th><th>Fim</th><th>Status</th></tr></thead><tbody>${p.memberships.map(m=>`<tr><td><a href="#/times/${encodeURIComponent(m.teamSlug)}" style="color:var(--cyan)">${esc(m.teamName)}</a></td><td>${date(m.startsOn)}</td><td>${date(m.endsOn)}</td><td>${esc(m.rosterStatus)}</td></tr>`).join('')}</tbody></table></div>`:empty('Sem passagens','Nenhum vínculo com time foi cadastrado.')}</section><section class="section"><h2>Participações em campeonatos</h2>${p.majors.length?`<div class="table-wrap"><table><thead><tr><th>Campeonato</th><th>Time</th><th>Major</th><th>Colocação</th><th>Mapas</th></tr></thead><tbody>${p.majors.map(m=>`<tr><td>${esc(m.name)}</td><td>${esc(m.teamName)}</td><td>${m.isMajor?'Sim':'Não'}</td><td>${m.finalPlacement??'—'}</td><td>${m.mapsPlayed??0}</td></tr>`).join('')}</tbody></table></div>`:empty('Sem participações','Nenhuma participação foi registrada.')}</section></div>`}
function ratingsSection(v){const entries=[['Overall',v.gameOverall],['Mira',v.aim],['Impacto',v.impact],['Consistência',v.consistency],['Clutch',v.clutch],['Experiência',v.experience],['Liderança',v.leadership],['AWP',v.awp],['Entry',v.entry],['Support',v.support],['Forma',v.seasonForm]].filter(x=>x[1]!=null);return `<section class="section"><h2>Ratings internos — ${esc(v.versionLabel)}</h2><div class="ratings">${entries.map(([label,value])=>`<div class="rating"><div class="rating-top"><span>${label}</span><b class="mono">${value}</b></div><div class="bar"><span style="width:${Math.max(0,Math.min(100,Number(value)))}%"></span></div></div>`).join('')}</div></section>`}
function performanceTable(rows){return `<div class="table-wrap"><table><thead><tr><th>Período</th><th>Fonte</th><th>Rating</th><th>Firepower</th><th>Entrying</th><th>Trading</th><th>Opening</th><th>Clutching</th><th>Sniping</th><th>Utility</th><th>Amostra</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${date(x.startsOn)} — ${date(x.endsOn)}${x.isPartial?' (parcial)':''}</td><td>${esc(x.providerName)}</td><td class="mono">${x.rating??'—'}</td><td>${x.firepower??'—'}</td><td>${x.entrying??'—'}</td><td>${x.trading??'—'}</td><td>${x.opening??'—'}</td><td>${x.clutching??'—'}</td><td>${x.sniping??'—'}</td><td>${x.utility??'—'}</td><td>${x.mapsPlayed} mapas</td></tr>`).join('')}</tbody></table></div>`}
async function teamsPage(){const data=await get('/teams?page=1&pageSize=100');cache.teams=data;app.innerHTML=`<div class="container">${heading('Times','Organizações cadastradas no banco de dados.')}<div class="toolbar"><input id="search" placeholder="Buscar por nome ou sigla…"></div><div class="grid" id="teamGrid">${data.data.length?data.data.map(teamCard).join(''):empty('Nenhum time cadastrado','Cadastre o primeiro time no painel administrativo.',true)}</div></div>`;document.querySelector('#search').oninput=e=>{const q=e.target.value.toLowerCase(),items=data.data.filter(t=>`${t.name} ${t.shortName||''}`.toLowerCase().includes(q));document.querySelector('#teamGrid').innerHTML=items.length?items.map(teamCard).join(''):empty('Nenhum resultado','Revise a busca.');bindCards()};bindCards()}
async function teamPage(slug){const t=await get('/teams/'+encodeURIComponent(slug));app.innerHTML=`<div class="container"><a class="btn" href="#/times">← Times</a><div class="profile-head" style="margin-top:15px">${avatar(t.shortName||t.name,t.slug)}<div><h1>${esc(t.name)}</h1><div class="profile-meta"><span>${esc(t.countryName||t.countryCode||'País não informado')}</span><span>${esc(t.regionName||'Região não informada')}</span><span>${t.active?'Ativo':'Inativo'}</span><span>Fundação: ${year(t.foundedOn)}</span></div></div></div><section class="section"><h2>Jogadores vinculados</h2>${t.players.length?`<div class="grid">${t.players.map(p=>`<article class="card clickable" data-href="#/jogadores/${encodeURIComponent(p.slug)}"><div class="card-head">${avatar(p.nickname,p.slug)}<div><div class="card-title">${esc(p.nickname)}</div><div class="card-meta">${esc(p.nationalityCode||'Sem país')} · ${esc(p.rosterStatus)}</div></div></div><div class="card-row"><span>${date(p.startsOn)}</span><span>${date(p.endsOn)}</span></div></article>`).join('')}</div>`:empty('Sem jogadores','Nenhuma passagem foi vinculada a este time.')}</section><section class="section"><h2>Lineups</h2>${t.lineups.length?`<div class="table-wrap"><table><thead><tr><th>Lineup</th><th>Temporada</th><th>Período</th><th>Membros</th></tr></thead><tbody>${t.lineups.map(l=>`<tr><td>${esc(l.name)}</td><td>${esc(l.seasonName)}</td><td>${date(l.startsOn)} — ${date(l.endsOn)}</td><td>${l.memberCount}</td></tr>`).join('')}</tbody></table></div>`:empty('Sem lineups','Nenhuma lineup histórica cadastrada.')}</section><section class="section"><h2>Campeonatos</h2>${t.tournaments.length?`<div class="table-wrap"><table><thead><tr><th>Campeonato</th><th>Data</th><th>Major</th><th>Colocação</th><th>Etapa</th></tr></thead><tbody>${t.tournaments.map(x=>`<tr><td>${esc(x.name)}</td><td>${date(x.startsOn)}</td><td>${x.isMajor?'Sim':'Não'}</td><td>${x.finalPlacement??'—'}</td><td>${esc(x.stageReached||'—')}</td></tr>`).join('')}</tbody></table></div>`:empty('Sem campeonatos','Nenhuma participação cadastrada.')}</section></div>`;bindCards()}
async function seasonsPage(){const rows=await get('/seasons');cache.seasons=rows;app.innerHTML=`<div class="container">${heading('Temporadas','Períodos competitivos cadastrados e sua disponibilidade no draft.')}<div class="grid">${rows.length?rows.map(s=>`<article class="card"><div class="card-head">${avatar(String(s.year),s.code)}<div><div class="card-title">${esc(s.name)}</div><div class="card-meta">${date(s.startsOn)} — ${date(s.endsOn)}</div></div></div><div style="margin-top:12px"><span class="badge">${esc(s.gameVersion)}</span>${s.isDraftEnabled?'<span class="badge green">Draft ativo</span>':'<span class="badge">Draft inativo</span>'}</div><div class="card-row"><span>${s.playerVersionCount} versão(ões)</span><span>${(s.maps||[]).length} mapas</span></div>${(s.maps||[]).length?`<div style="margin-top:9px">${s.maps.map(m=>`<span class="badge">${esc(m.name)}</span>`).join('')}</div>`:''}</article>`).join(''):empty('Nenhuma temporada cadastrada','Cadastre temporadas e map pools no painel.',true)}</div></div>`}
async function tournamentsPage(){const rows=await get('/tournaments');cache.tournaments=rows;app.innerHTML=`<div class="container">${heading('Campeonatos','Edições e resultados registrados no banco.')}<div class="grid two">${rows.length?rows.map(t=>`<article class="card"><div class="card-head">${avatar(t.isMajor?'M':t.tier||'C',t.id)}<div><div class="card-title">${esc(t.name)}</div><div class="card-meta">${esc(t.organizer||t.seriesName)} · ${date(t.startsOn)}</div></div></div><div style="margin-top:11px">${t.isMajor?'<span class="badge orange">Major</span>':''}${t.tier?`<span class="badge">Tier ${esc(t.tier)}</span>`:''}</div><div class="card-row"><span>${t.participants} participante(s)</span><span>Campeão: ${esc(t.champion||'—')}</span></div></article>`).join(''):empty('Nenhum campeonato cadastrado','Cadastre campeonato, edição, participantes e roster.',true)}</div></div>`}
async function playPage(){const summary=cache.summary||await get('/summary');cache.summary=summary;const majorReady=Number(summary.ratedDraftVersions)>=5&&Number(summary.seasons)>=1;const guessReady=Number(summary.players)>=2;app.innerHTML=`<div class="container">${heading('Minigames','A disponibilidade é calculada usando apenas os dados existentes no banco.')}<div class="mode-grid"><article class="mode"><div class="eyebrow">Minigame 1</div><h2>Monte seu time e dispute um Major</h2><p class="sub">Escolha cinco versões da mesma temporada e um coach.</p><div class="requirements"><div class="requirement ${summary.seasons>=1?'ok':'no'}"><span>Temporada cadastrada</span><span>${summary.seasons}/1</span></div><div class="requirement ${summary.ratedDraftVersions>=5?'ok':'no'}"><span>Versões elegíveis com ratings</span><span>${summary.ratedDraftVersions}/5</span></div></div>${majorReady?'<div class="notice">A base atingiu o mínimo estrutural. O motor de draft será conectado na próxima etapa.</div>':'<div class="notice">Cadastre temporadas, versões elegíveis, funções e ratings para liberar este modo sem dados artificiais.</div>'}<div class="actions"><a class="btn ${majorReady?'primary':''}" href="/admin.html">Completar dados</a></div></article><article class="mode"><div class="eyebrow">Minigame 2</div><h2>Quem é o jogador?</h2><p class="sub">Descubra uma identidade usando dicas derivadas da carreira.</p><div class="requirements"><div class="requirement ${summary.players>=2?'ok':'no'}"><span>Jogadores cadastrados</span><span>${summary.players}/2</span></div></div>${guessReady?'<div class="notice">Existem jogadores suficientes. As dicas serão liberadas conforme nacionalidade, times e Majors forem preenchidos.</div>':'<div class="notice">Cadastre pelo menos dois jogadores para que o sorteio não use exemplos fictícios.</div>'}<div class="actions"><a class="btn ${guessReady?'primary':''}" href="/admin.html">Completar dados</a></div></article></div></div>`}
function bindCards(){document.querySelectorAll('[data-href]').forEach(card=>card.onclick=()=>location.hash=card.dataset.href)}
async function route(){document.querySelector('#headerInner').classList.remove('mobile-open');const parts=(location.hash.slice(2)||'').split('/').filter(Boolean).map(decodeURIComponent);document.querySelectorAll('.nav-link').forEach(a=>a.classList.toggle('active',a.getAttribute('href')===(parts.length?`#/${parts[0]}`:'#/')));loading();try{if(!parts.length)return await home();if(parts[0]==='jogadores'&&parts[1])return await playerPage(parts[1]);if(parts[0]==='jogadores')return await playersPage();if(parts[0]==='times'&&parts[1])return await teamPage(parts[1]);if(parts[0]==='times')return await teamsPage();if(parts[0]==='temporadas')return await seasonsPage();if(parts[0]==='campeonatos')return await tournamentsPage();if(parts[0]==='jogar')return await playPage();location.hash='#/'}catch(error){app.innerHTML=`<div class="container">${heading('Não foi possível carregar','A API retornou um erro.')}<div class="error-box">${esc(error.message)}</div><div class="actions"><button class="btn" onclick="route()">Tentar novamente</button><a class="btn" href="/admin.html">Abrir painel</a></div></div>`;toast(error.message)}}
window.addEventListener('hashchange',route);document.querySelector('#menu').onclick=()=>document.querySelector('#headerInner').classList.toggle('mobile-open');route();
</script>
</body>
